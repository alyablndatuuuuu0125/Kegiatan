<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Daftar Kegiatan Harian</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:420px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:60%;
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
cursor:pointer;
}

ul{
list-style:none;
padding:0;
}

li{
padding:10px;
margin:5px 0;
background:#eee;
display:flex;
justify-content:space-between;
align-items:center;
}

.selesai{
text-decoration:line-through;
color:gray;
}

.kegiatan-info{
text-align:left;
}

</style>

</head>
<body>

<div class="container">

<h2>Daftar Kegiatan Harian</h2>

<input type="date" id="tanggal">
<br>
<input type="text" id="inputKegiatan" placeholder="Masukkan kegiatan">
<button onclick="tambahKegiatan()">Tambah</button>

<ul id="daftarKegiatan"></ul>

</div>

<script>

let kegiatan = JSON.parse(localStorage.getItem("kegiatan")) || [];

tampilkanKegiatan();

function simpanData(){
localStorage.setItem("kegiatan",JSON.stringify(kegiatan));
}

function tampilkanKegiatan(){

let daftar = document.getElementById("daftarKegiatan");
daftar.innerHTML="";

kegiatan.forEach((item,index)=>{

let li=document.createElement("li");

li.innerHTML=`

<div class="kegiatan-info">
<span class="${item.selesai ? 'selesai':''}">
${item.nama}
</span>
<br>
<small>${item.tanggal}</small>
</div>

<div>
<button onclick="toggleSelesai(${index})">✔</button>
<button onclick="editKegiatan(${index})">✏</button>
<button onclick="hapusKegiatan(${index})">✖</button>
</div>

`;

daftar.appendChild(li);

});

}

function tambahKegiatan(){

let input=document.getElementById("inputKegiatan");
let tanggal=document.getElementById("tanggal");

let nama=input.value;

if(nama===""){
alert("Kegiatan tidak boleh kosong");
return;
}

kegiatan.push({
nama:nama,
tanggal:tanggal.value,
selesai:false
});

input.value="";
tanggal.value="";

simpanData();
tampilkanKegiatan();

}

function toggleSelesai(index){

kegiatan[index].selesai=!kegiatan[index].selesai;

simpanData();
tampilkanKegiatan();

}

function hapusKegiatan(index){

kegiatan.splice(index,1);

simpanData();
tampilkanKegiatan();

}

function editKegiatan(index){

let kegiatanBaru=prompt("Edit kegiatan:",kegiatan[index].nama);

if(kegiatanBaru!==null){
kegiatan[index].nama=kegiatanBaru;
}

simpanData();
tampilkanKegiatan();

}

</script>

</body>
</html>
